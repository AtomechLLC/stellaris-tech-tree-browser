<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Spike 003 — Tech Classifier by Empire</title>
<style>
  :root {
    --bg: #0a0e17; --panel: #121826; --panel2: #0e1420; --line: #24304a;
    --text: #dfe6f2; --dim: #8794ad; --gold: #ffcf6b;
    --physics: #4aa3ff; --society: #57c96a; --engineering: #ff9a4d;
    --researched: #57c96a; --available: #ffcf6b; --reachable: #6b8cff; --never: #ff6b7a;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: radial-gradient(1200px 700px at 70% -10%, #16203a 0%, var(--bg) 60%); color: var(--text);
    font: 14px/1.45 ui-sans-serif, system-ui, "Segoe UI", Roboto, sans-serif; }
  header { padding: 18px 22px 10px; border-bottom: 1px solid var(--line); }
  h1 { font-size: 17px; margin: 0 0 3px; letter-spacing: .3px; }
  h1 span { color: var(--gold); }
  .sub { color: var(--dim); font-size: 12px; }
  .controls { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; margin-top: 12px; }
  select, input { background: var(--panel); color: var(--text); border: 1px solid var(--line);
    border-radius: 8px; padding: 8px 10px; font: inherit; }
  select { min-width: 260px; }
  input { min-width: 200px; }
  .identity { margin-top: 10px; display: flex; gap: 6px; flex-wrap: wrap; align-items: center; min-height: 24px; }
  .chip { font-size: 11px; padding: 3px 9px; border-radius: 999px; border: 1px solid var(--line);
    background: var(--panel); color: var(--dim); white-space: nowrap; }
  .chip b { color: var(--text); font-weight: 600; }
  .summary { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 14px 22px 4px; }
  .stat { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 10px 12px; }
  .stat .n { font-size: 22px; font-weight: 700; }
  .stat .l { font-size: 11px; color: var(--dim); text-transform: uppercase; letter-spacing: .5px; }
  .bar { height: 5px; border-radius: 3px; margin-top: 8px; background: #1b2438; overflow: hidden; }
  .bar > i { display: block; height: 100%; }
  .stat.researched .n { color: var(--researched); } .stat.researched .bar > i { background: var(--researched); }
  .stat.available .n { color: var(--available); }   .stat.available .bar > i { background: var(--available); }
  .stat.reachable .n { color: var(--reachable); }   .stat.reachable .bar > i { background: var(--reachable); }
  .stat.never .n { color: var(--never); }           .stat.never .bar > i { background: var(--never); }
  .cols { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 12px 22px 24px; align-items: start; }
  .col { background: var(--panel2); border: 1px solid var(--line); border-radius: 12px; overflow: hidden;
    display: flex; flex-direction: column; max-height: calc(100vh - 250px); }
  .col > h2 { font-size: 12px; margin: 0; padding: 10px 12px; border-bottom: 1px solid var(--line);
    position: sticky; top: 0; background: var(--panel); text-transform: uppercase; letter-spacing: .6px; }
  .col > h2 small { color: var(--dim); font-weight: 400; letter-spacing: 0; text-transform: none; }
  .col.researched > h2 { color: var(--researched); } .col.available > h2 { color: var(--available); }
  .col.reachable > h2 { color: var(--reachable); }   .col.never > h2 { color: var(--never); }
  .list { overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 4px; }
  .tech { display: flex; align-items: center; gap: 8px; padding: 5px 8px; border-radius: 7px;
    background: var(--panel); border: 1px solid transparent; cursor: default; }
  .tech:hover { border-color: var(--line); }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex: 0 0 8px; }
  .dot.physics { background: var(--physics); } .dot.society { background: var(--society); }
  .dot.engineering { background: var(--engineering); }
  .tech .nm { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .tech .ti { color: var(--dim); font-size: 11px; }
  .legend { display: flex; gap: 14px; padding: 0 22px 14px; color: var(--dim); font-size: 12px; }
  .legend span { display: inline-flex; align-items: center; gap: 6px; }
  .muted { opacity: .72; }
  .empty { color: var(--dim); padding: 14px; font-size: 12px; }
</style>
</head>
<body>
<header>
  <h1>Stellaris Tech Classifier <span>— by empire</span></h1>
  <div class="sub">Spike 003 · classification runs entirely in-browser · save: mp_CUBE-CUBE-CUBE-CUBE 11 (v4.5.0)</div>
  <div class="controls">
    <label>Empire <select id="empire"></select></label>
    <input id="filter" placeholder="filter techs…" />
    <span class="sub" id="meta"></span>
  </div>
  <div class="identity" id="identity"></div>
</header>

<div class="summary" id="summary"></div>
<div class="legend">
  <span><i class="dot physics" style="width:8px;height:8px;border-radius:50%;background:var(--physics)"></i> Physics</span>
  <span><i class="dot society" style="width:8px;height:8px;border-radius:50%;background:var(--society)"></i> Society</span>
  <span><i class="dot engineering" style="width:8px;height:8px;border-radius:50%;background:var(--engineering)"></i> Engineering</span>
  <span class="muted">hover a “never” tech to see why it’s gated out</span>
</div>
<div class="cols" id="cols"></div>

<script>
// ---------- classifier port (faithful to gates.ts + classify.ts) ------------
const MONOTONIC = new Set(["is_individual_machine","has_ascension_perk","has_psionic_ascension",
  "has_make_spiritualist_perk","has_technology","has_tradition","country_uses_bio_ships"]);
function isDlcTrigger(t){ return /_dlc$/.test(t) ||
  ["host_has_dlc","has_ancrel","has_nemesis","has_infernals","has_paragon_dlc","has_grand_archive_dlc"].includes(t); }

function buildState(e){
  const ethics = new Set(e.ethics), civics = new Set(e.civics);
  const isMachine = e.authority === "auth_machine_intelligence";
  const isHive = e.authority === "auth_hive_mind";
  const isGestalt = isMachine || isHive || ethics.has("ethic_gestalt_consciousness");
  const isIndividualMachine = [...civics].some(c=>c.includes("individual_machine")) || isMachine;
  return { isGestalt, isHive, isMachine, isIndividualMachine, isMegacorp: e.authority==="auth_corporate",
    ethics, civics, origin: e.origin, researched: new Set(e.researched), ownsAllDlc: true };
}
function evalLeaf(n, s){
  const val = n.value; const wantTrue = !(val === false || val === "no");
  const b = a => a === wantTrue;
  switch(n.trigger){
    case "is_gestalt": return b(s.isGestalt);
    case "is_regular_empire": return b(!s.isGestalt);
    case "is_hive_empire": return b(s.isHive);
    case "is_machine_empire": return b(s.isMachine);
    case "is_individual_machine": return b(s.isIndividualMachine);
    case "is_megacorp": return b(s.isMegacorp);
    case "has_ethic": return val==="ethic_gestalt_consciousness" ? s.isGestalt : s.ethics.has(String(val));
    case "has_civic": case "has_valid_civic": return s.civics.has(String(val));
    case "has_origin": return s.origin === val;
    case "has_technology": return s.researched.has(String(val));
    default: return isDlcTrigger(n.trigger) ? (s.ownsAllDlc ? true : null) : null;
  }
}
function sat(n, s){
  if (n.op === "leaf"){
    if (n.static){ const v = evalLeaf(n,s); if (v===null) return {t:true,f:true}; return {t:v===true,f:v===false}; }
    if (MONOTONIC.has(n.trigger) && evalLeaf(n,s)===true) return {t:true,f:false};
    return {t:true,f:true};
  }
  const k = n.children.map(c=>sat(c,s));
  switch(n.op){
    case "and": return {t:k.every(x=>x.t), f:k.some(x=>x.f)};
    case "or":  return {t:k.some(x=>x.t),  f:k.every(x=>x.f)};
    case "not": return {t:k[0]?k[0].f:true, f:k[0]?k[0].t:true};
    case "nor": return {t:k.every(x=>x.f), f:k.some(x=>x.t)};
  }
}
function kleene(n, s){
  if (n.op==="leaf") return evalLeaf(n,s);
  const k = n.children.map(c=>kleene(c,s));
  const anyT=k.some(x=>x===true), anyF=k.some(x=>x===false), anyU=k.some(x=>x===null);
  switch(n.op){
    case "and": return anyF?false:anyU?null:true;
    case "or":  return anyT?true:anyU?null:false;
    case "not": return k[0]===null?null:!k[0];
    case "nor": return anyT?false:anyU?null:true;
  }
}
function gateVerdict(gate, s){
  if (!gate) return { never:false, passesNow:true };
  return { never: !sat(gate,s).t, passesNow: kleene(gate,s)!==false };
}
function classify(techs, s){
  const byKey = new Map(techs.map(t=>[t.key,t]));
  const gateNever = new Set();
  for (const t of techs) if (gateVerdict(t.gate,s).never) gateNever.add(t.key);
  const memo = new Map();
  function reach(key, stk){
    if (memo.has(key)) return memo.get(key);
    if (gateNever.has(key)){ memo.set(key,false); return false; }
    if (stk.has(key)) return true;
    stk.add(key);
    const t = byKey.get(key);
    const ok = (t?.prerequisites||[]).every(p=> byKey.has(p) ? reach(p,stk) : true);
    stk.delete(key); memo.set(key,ok); return ok;
  }
  const out = new Map();
  for (const t of techs){
    if (s.researched.has(t.key)) out.set(t.key,"researched");
    else if (gateNever.has(t.key) || !reach(t.key,new Set())) out.set(t.key,"never");
    else {
      const met = t.prerequisites.every(p=>s.researched.has(p));
      out.set(t.key, met && gateVerdict(t.gate,s).passesNow ? "available" : "reachable");
    }
  }
  return { buckets: out, gateNever };
}
function gateReason(gate){
  if (!gate) return "";
  function walk(n){
    if (n.op==="leaf") return `${n.trigger}=${n.value}`;
    if (n.op==="not") return `NOT(${n.children.map(walk).join(", ")})`;
    return `${n.op.toUpperCase()}(${n.children.map(walk).join(", ")})`;
  }
  return walk(gate);
}

// ---------- UI --------------------------------------------------------------
const BUCKETS = [["researched","Researched"],["available","Available now"],["reachable","Reachable later"],["never","Never"]];
let DATA = null, current = null;
const $ = id => document.getElementById(id);

fetch("./demo-data.json").then(r=>r.json()).then(d=>{
  DATA = d;
  const sel = $("empire");
  const players = d.empires.filter(e=>e.playerName).sort((a,b)=>b.researchedCount-a.researchedCount);
  const others  = d.empires.filter(e=>!e.playerName && /^[A-Za-z]/.test(e.name)).sort((a,b)=>b.researchedCount-a.researchedCount);
  const gp = document.createElement("optgroup"); gp.label = "Players";
  for (const e of players){ const o=document.createElement("option"); o.value=e.id; o.textContent=`${e.name} (${e.researchedCount} tech)`; gp.appendChild(o); }
  sel.appendChild(gp);
  const go = document.createElement("optgroup"); go.label = "Other empires";
  for (const e of others){ const o=document.createElement("option"); o.value=e.id; o.textContent=`${e.name} (${e.researchedCount} tech)`; go.appendChild(o); }
  sel.appendChild(go);
  sel.onchange = () => render(+sel.value);
  $("filter").oninput = () => render(current);
  render(players[0].id);
});

function render(empId){
  current = empId;
  const e = DATA.empires.find(x=>x.id===empId);
  const s = buildState(e);
  const { buckets, gateNever } = classify(DATA.techs, s);
  const filter = $("filter").value.trim().toLowerCase();

  // identity
  $("identity").innerHTML =
    chip("authority", (e.authority||"?").replace("auth_","")) +
    (s.isGestalt?chip("class", s.isMachine?"machine intelligence":s.isHive?"hive mind":"gestalt"):chip("class","regular")) +
    chip("origin", (e.origin||"—").replace("origin_","")) +
    e.ethics.map(x=>chip("ethic", x.replace("ethic_",""))).join("") +
    e.civics.map(x=>chip("civic", x.replace("civic_",""))).join("");
  $("meta").textContent = `${DATA.techs.length} techs · classified in-browser`;

  // counts
  const counts = { researched:0, available:0, reachable:0, never:0 };
  for (const b of buckets.values()) counts[b]++;
  const total = DATA.techs.length;
  $("summary").innerHTML = BUCKETS.map(([k,l])=>`
    <div class="stat ${k}"><div class="n">${counts[k]}</div><div class="l">${l}</div>
    <div class="bar"><i style="width:${(100*counts[k]/total).toFixed(1)}%"></i></div></div>`).join("");

  // columns
  const byBucket = { researched:[], available:[], reachable:[], never:[] };
  for (const t of DATA.techs){
    if (filter && !t.name.toLowerCase().includes(filter) && !t.key.toLowerCase().includes(filter)) continue;
    byBucket[buckets.get(t.key)].push(t);
  }
  const sortT = arr => arr.sort((a,b)=> a.tier-b.tier || a.name.localeCompare(b.name));
  $("cols").innerHTML = BUCKETS.map(([k,l])=>{
    const items = sortT(byBucket[k]);
    const rows = items.map(t=>{
      const reason = k==="never" ? (gateNever.has(t.key)?gateReason(t.gate)||"gated":"prerequisites unreachable") : "";
      return `<div class="tech ${k==='never'?'muted':''}" ${reason?`title="${reason.replace(/"/g,'&quot;')}"`:""}>
        <i class="dot ${t.area}"></i><span class="nm">${t.name}</span><span class="ti">T${t.tier}</span></div>`;
    }).join("");
    return `<div class="col ${k}"><h2>${l} <small>${items.length}</small></h2>
      <div class="list">${rows||'<div class="empty">none</div>'}</div></div>`;
  }).join("");
}
function chip(label,val){ return `<span class="chip">${label} <b>${val}</b></span>`; }
</script>
</body>
</html>
