<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Spike 004 — In-Browser .sav Pipeline</title>
<style>
  :root { --bg:#0a0e17; --panel:#121826; --line:#24304a; --text:#dfe6f2; --dim:#8794ad; --gold:#ffcf6b;
    --researched:#57c96a; --available:#ffcf6b; --reachable:#6b8cff; --never:#ff6b7a; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--text); font:14px/1.5 ui-sans-serif,system-ui,"Segoe UI",sans-serif; padding:22px; }
  h1 { font-size:17px; margin:0 0 3px; } h1 span { color:var(--gold); }
  .sub { color:var(--dim); font-size:12px; margin-bottom:16px; }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:16px; margin-bottom:14px; }
  button { background:var(--gold); color:#1a1200; border:0; border-radius:8px; padding:9px 16px; font:inherit; font-weight:600; cursor:pointer; }
  button.ghost { background:var(--panel); color:var(--text); border:1px solid var(--line); }
  .drop { border:1.5px dashed var(--line); border-radius:10px; padding:16px; text-align:center; color:var(--dim); }
  .drop.hot { border-color:var(--gold); color:var(--text); }
  select { background:var(--panel); color:var(--text); border:1px solid var(--line); border-radius:8px; padding:8px 10px; font:inherit; min-width:280px; }
  table { border-collapse:collapse; width:100%; font-variant-numeric:tabular-nums; }
  td,th { text-align:left; padding:4px 10px; border-bottom:1px solid var(--line); }
  th { color:var(--dim); font-weight:500; font-size:12px; }
  .big { font-size:26px; font-weight:700; }
  .row { display:flex; gap:26px; flex-wrap:wrap; align-items:flex-end; }
  .metric .l { color:var(--dim); font-size:11px; text-transform:uppercase; letter-spacing:.5px; }
  .buckets { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
  .b { border:1px solid var(--line); border-radius:10px; padding:12px; }
  .b .n { font-size:24px; font-weight:700; } .b .l { font-size:11px; color:var(--dim); text-transform:uppercase; }
  .b.researched .n{color:var(--researched)} .b.available .n{color:var(--available)} .b.reachable .n{color:var(--reachable)} .b.never .n{color:var(--never)}
  code { color:var(--gold); } .ok{color:var(--researched)} .warn{color:var(--never)}
</style>
</head>
<body>
  <h1>In-browser <span>.sav</span> pipeline</h1>
  <div class="sub">Spike 004 · unzip → parse 72 MB gamestate → extract empires → classify · zero server compute</div>

  <div class="card">
    <div class="row" style="justify-content:space-between">
      <div id="drop" class="drop" style="flex:1">Drop a <code>.sav</code> here, or
        <button class="ghost" id="pick">choose file</button>
        <input id="file" type="file" accept=".sav" hidden />
      </div>
      <button id="auto">▶ Run bundled save</button>
    </div>
    <div id="status" class="sub" style="margin-top:12px"></div>
  </div>

  <div class="card" id="perf" style="display:none">
    <div class="row">
      <div class="metric"><div class="big" id="m-total"></div><div class="l">total ms (unzip→classify-ready)</div></div>
      <div class="metric"><div class="big" id="m-parse"></div><div class="l">parse ms</div></div>
      <div class="metric"><div class="big" id="m-heap"></div><div class="l">JS heap MB</div></div>
      <div class="metric"><div class="big" id="m-emp"></div><div class="l">empires</div></div>
    </div>
    <table style="margin-top:14px"><tbody id="breakdown"></tbody></table>
  </div>

  <div class="card" id="classifyCard" style="display:none">
    <div class="row" style="margin-bottom:12px">
      <label>Empire <select id="empire"></select></label>
      <span class="sub" id="validation"></span>
    </div>
    <div class="buckets" id="buckets"></div>
  </div>

<script type="module">
import { extractFromSav, buildEmpireState, classifyAll } from "./bundle.js";

const $ = id => document.getElementById(id);
let TECHS = null, RESULT = null;

fetch("./data.json").then(r=>r.json()).then(d=>{
  TECHS = d.techs.map(t => ({ key:t.key, prerequisites:t.prerequisites, gate:t.gate }));
  $("status").innerHTML = `tech dataset loaded: <code>${TECHS.length}</code> techs. Ready.`;
});

async function run(bytes, label){
  $("status").innerHTML = `parsing ${label} (${(bytes.length/1024/1024).toFixed(1)} MB zip)…`;
  await new Promise(r=>setTimeout(r,20)); // let status paint
  let res;
  try { res = await extractFromSav(bytes); }
  catch(e){ $("status").innerHTML = `<span class="warn">error: ${e.message}</span>`; throw e; }
  RESULT = res;
  const t = res.timings;
  $("perf").style.display = "";
  $("m-total").textContent = Math.round(t.totalMs);
  $("m-parse").textContent = Math.round(t.parseMs);
  $("m-heap").textContent = res.heapMb ? Math.round(res.heapMb) : "n/a";
  $("m-emp").textContent = res.empires.length;
  $("breakdown").innerHTML = `
    <tr><th>gamestate decompressed</th><td>${(res.sizes.gamestateBytes/1024/1024).toFixed(1)} MB</td>
        <th>unzip</th><td>${Math.round(t.unzipMs)} ms</td></tr>
    <tr><th>decode (win-1252)</th><td>${Math.round(t.decodeMs)} ms</td>
        <th>extract empires</th><td>${Math.round(t.extractMs)} ms</td></tr>`;
  $("status").innerHTML = `<span class="ok">✓ ${label} processed entirely in-browser in ${Math.round(t.totalMs)} ms</span>`;

  // empire picker (players first)
  const sel = $("empire"); sel.innerHTML = "";
  const players = res.empires.filter(e=>e.playerName);
  const others  = res.empires.filter(e=>!e.playerName && /^[A-Za-z]/.test(e.name));
  const grp = (label, arr) => { const g=document.createElement("optgroup"); g.label=label;
    for(const e of arr){ const o=document.createElement("option"); o.value=e.id; o.textContent=`${e.name} (${e.researchedCount})`; g.appendChild(o);} return g; };
  sel.appendChild(grp("Players", players));
  if (others.length) sel.appendChild(grp("Other empires", others));
  sel.onchange = () => classifyEmpire(+sel.value);
  $("classifyCard").style.display = "";
  classifyEmpire(players[0].id);
}

function classifyEmpire(id){
  const e = RESULT.empires.find(x=>x.id===id);
  const state = buildEmpireState(e);
  const r = classifyAll(TECHS, state);
  const B = [["researched","Researched"],["available","Available now"],["reachable","Reachable later"],["never","Never"]];
  $("buckets").innerHTML = B.map(([k,l])=>`<div class="b ${k}"><div class="n">${r.counts[k]}</div><div class="l">${l}</div></div>`).join("");
  const sum = r.counts.researched+r.counts.available+r.counts.reachable+r.counts.never;
  $("validation").innerHTML = `sum=<code>${sum}</code>/${TECHS.length} · researched-called-never: <span class="${r.falseNeverResearched.length?'warn':'ok'}">${r.falseNeverResearched.length}</span>`;
}

// bundled save
$("auto").onclick = async () => {
  const buf = await fetch("./save.sav").then(r=>r.arrayBuffer());
  run(new Uint8Array(buf), "bundled save");
};
// file input + drag/drop
$("pick").onclick = () => $("file").click();
$("file").onchange = e => { const f=e.target.files[0]; if(f) f.arrayBuffer().then(b=>run(new Uint8Array(b), f.name)); };
const drop = $("drop");
["dragover","dragenter"].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.add("hot");}));
["dragleave","drop"].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.remove("hot");}));
drop.addEventListener("drop", e => { const f=e.dataTransfer.files[0]; if(f) f.arrayBuffer().then(b=>run(new Uint8Array(b), f.name)); });
</script>
</body>
</html>
