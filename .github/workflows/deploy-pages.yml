name: Deploy to GitHub Pages

# Builds the static SPA in app/ and publishes app/dist to GitHub Pages.
# Enable once in the repo: Settings → Pages → Build and deployment → Source =
# "GitHub Actions". The site then serves at
# https://<owner>.github.io/<repo>/ (a PROJECT page, hence the VITE_BASE subpath).
#
# Custom domain or a user/org (root) page? Set VITE_BASE to "/" below.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; a newer push cancels an in-flight run.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install & build
        working-directory: app
        env:
          # Project-page subpath ("/<repo>/"). Change to "/" for a custom domain
          # or a user/org page. `npm run build` runs copy-data (reads the tracked
          # pipeline/data snapshot) then tsc + vite build — no pipeline deps needed.
          VITE_BASE: /${{ github.event.repository.name }}/
        run: |
          npm ci
          npm run build
          # Belt-and-suspenders: keep files/dirs starting with "_" (icon names)
          # from ever being dropped by Jekyll on legacy Pages setups.
          touch dist/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
