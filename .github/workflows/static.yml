# Build the Vite SPA in app/ and deploy app/dist to GitHub Pages.
#
# NOTE: the default GitHub "static HTML" template uploads the whole repo (path:
# ".") with no build — that would publish raw source, not the app. This builds
# first. Site serves at https://<owner>.github.io/<repo>/ (a PROJECT page, hence
# the VITE_BASE subpath). For a custom domain or user/org page, set VITE_BASE="/".
name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One Pages deploy at a time; don't cancel an in-progress production deploy.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install & build
        working-directory: app
        env:
          # Project-page subpath ("/<repo>/"). Change to "/" for a custom domain
          # or a user/org page. `npm run build` runs copy-data (reads the tracked
          # pipeline/data snapshot) then tsc + vite build — no pipeline deps needed.
          VITE_BASE: /${{ github.event.repository.name }}/
        run: |
          npm ci
          npm run build
          # Keep "_"-prefixed icon files from being dropped by Jekyll on legacy setups.
          touch dist/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
